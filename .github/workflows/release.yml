name: Kaiforth Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kaiforth
            asset_name: kaiforth-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kaiforth.exe
            asset_name: kaiforth-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kaiforth
            asset_name: kaiforth-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kaiforth
            asset_name: kaiforth-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          fail_on_unmatched_files: true
